<div class="iva-visual-block iva-visual-block--ledgers" aria-labelledby="five-ledgers-title five-ledgers-desc">
  <figure class="iva-visual-card">
    <svg viewBox="0 0 1200 760" role="img" aria-labelledby="five-ledgers-title five-ledgers-desc" xmlns="http://www.w3.org/2000/svg">
      <title id="five-ledgers-title">IVA five-ledger overview</title>
      <desc id="five-ledgers-desc">A simple diagram showing finance as one of five ledgers, alongside operations, capacity, learning and innovation, and externalities and equity. The diagram explains that IVA gives different kinds of value their own standing so problems do not have to wait on finance to become real.</desc>
      <defs>
        <linearGradient id="ledgerBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f7f8fc"/>
        </linearGradient>
        <filter id="ledgerShadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14203a" flood-opacity="0.10"/>
        </filter>
        <style>
          .frame { fill: url(#ledgerBg); stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .eyebrow { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #4a5673; }
          .headline { font: 700 44px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .subcopy { font: 500 23px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .center-card { fill: #1f2a44; }
          .center-title { font: 800 34px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; }
          .center-copy { font: 500 20px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: rgba(255,255,255,0.84); }
          .ledger-card { fill: #ffffff; stroke: rgba(31,42,68,0.10); stroke-width: 2; }
          .ledger-card-finance { fill: rgba(255,244,214,0.82); stroke: rgba(242,169,0,0.42); stroke-width: 2; }
          .ledger-title { font: 700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .ledger-copy { font: 500 17px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .connector { stroke: rgba(31,42,68,0.18); stroke-width: 4; }
          .note { font: 500 19px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
        </style>
      </defs>

      <rect class="frame" x="18" y="18" width="1164" height="724" rx="34" filter="url(#ledgerShadow)"/>

      <text class="eyebrow" x="82" y="94">IVA architecture</text>
      <text class="headline" x="82" y="152">Finance is one ledger, not the whole business.</text>
      <text class="subcopy" x="82" y="202">IVA gives different kinds of value their own standing so structural problems do not have to wait until they finally show up in finance.</text>

      <line class="connector" x1="600" y1="390" x2="304" y2="390"/>
      <line class="connector" x1="600" y1="390" x2="896" y2="390"/>
      <line class="connector" x1="600" y1="390" x2="452" y2="262"/>
      <line class="connector" x1="600" y1="390" x2="748" y2="262"/>
      <line class="connector" x1="600" y1="390" x2="600" y2="586"/>

      <rect class="center-card" x="430" y="300" width="340" height="180" rx="28"/>
      <text class="center-title" x="470" y="360">Different kinds of value</text>
      <text class="center-title" x="470" y="402">need their own standing.</text>
      <text class="center-copy" x="470" y="440">That is what lets a business keep seeing the structure after the consultant steps back.</text>

      <rect class="ledger-card-finance" x="128" y="326" width="224" height="128" rx="24"/>
      <text class="ledger-title" x="166" y="384">Financial</text>
      <text class="ledger-copy" x="166" y="416">Cash, cost, margin,</text>
      <text class="ledger-copy" x="166" y="440">and formal money logic.</text>

      <rect class="ledger-card" x="848" y="326" width="224" height="128" rx="24"/>
      <text class="ledger-title" x="886" y="384">Operational</text>
      <text class="ledger-copy" x="886" y="416">How work moves, where</text>
      <text class="ledger-copy" x="886" y="440">it stalls, and who fixes it.</text>

      <rect class="ledger-card" x="318" y="130" width="268" height="112" rx="24"/>
      <text class="ledger-title" x="352" y="186">Capacity</text>
      <text class="ledger-copy" x="352" y="216">What the structure is asking</text>
      <text class="ledger-copy" x="352" y="238">people and teams to carry.</text>

      <rect class="ledger-card" x="618" y="130" width="288" height="112" rx="24"/>
      <text class="ledger-title" x="652" y="186">Learning + Innovation</text>
      <text class="ledger-copy" x="652" y="216">What the business is learning</text>
      <text class="ledger-copy" x="652" y="238">before the mistake repeats.</text>

      <rect class="ledger-card" x="426" y="560" width="348" height="126" rx="24"/>
      <text class="ledger-title" x="462" y="618">Externalities + Equity</text>
      <text class="ledger-copy" x="462" y="650">Who else absorbs the cost when the structure works badly or unfairly.</text>

      <text class="note" x="82" y="714">IVA does not replace finance. It stops every other kind of value and failure from having to beg finance to become real.</text>
    </svg>
  </figure>
</div>
