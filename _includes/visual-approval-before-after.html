<div class="iva-visual-block iva-visual-block--comparison" aria-labelledby="approval-before-after-title approval-before-after-desc">
  <figure class="iva-visual-card">
    <svg viewBox="0 0 1200 760" role="img" aria-labelledby="approval-before-after-title approval-before-after-desc" xmlns="http://www.w3.org/2000/svg">
      <title id="approval-before-after-title">Approval structure before and after IVA</title>
      <desc id="approval-before-after-desc">A side-by-side comparison showing a traditional approval chain where routine work climbs the chain and corrections come back down, compared with an IVA-informed structure where routine authority stays closer to the work and only exceptions move upward.</desc>
      <defs>
        <linearGradient id="comparisonBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f7f8fc"/>
        </linearGradient>
        <filter id="comparisonShadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14203a" flood-opacity="0.10"/>
        </filter>
        <marker id="comparisonArrowBlue" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
          <path d="M0,0 L18,9 L0,18 Z" fill="#4a5673"/>
        </marker>
        <marker id="comparisonArrowAmber" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
          <path d="M0,0 L18,9 L0,18 Z" fill="#f2a900"/>
        </marker>
        <style>
          .frame { fill: url(#comparisonBg); stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .eyebrow { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #4a5673; }
          .headline { font: 700 44px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .subcopy { font: 500 23px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .panel { fill: #ffffff; stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .panel-left { fill: rgba(255,255,255,0.92); }
          .panel-right { fill: rgba(255,244,214,0.54); }
          .panel-title { font: 700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .panel-copy { font: 500 19px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .node { fill: #ffffff; stroke: rgba(31,42,68,0.12); stroke-width: 2; }
          .node-accent { fill: #fff4d6; stroke: rgba(242,169,0,0.42); stroke-width: 2; }
          .node-title { font: 700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .node-copy { font: 500 16px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .arrow-blue { stroke: #4a5673; stroke-width: 6; fill: none; marker-end: url(#comparisonArrowBlue); }
          .arrow-amber { stroke: #f2a900; stroke-width: 6; fill: none; marker-end: url(#comparisonArrowAmber); }
          .arrow-soft { stroke: rgba(31,42,68,0.18); stroke-width: 4; stroke-dasharray: 8 10; fill: none; }
          .legend-label { font: 700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #4a5673; }
          .legend-copy { font: 500 16px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
        </style>
      </defs>

      <rect class="frame" x="18" y="18" width="1164" height="724" rx="34" filter="url(#comparisonShadow)"/>

      <text class="eyebrow" x="82" y="94">Structural comparison</text>
      <text class="headline" x="82" y="152">The difference is where routine authority lives.</text>
      <text class="subcopy" x="82" y="202">Before IVA, routine work climbs the chain and the edits fall back down. After IVA, routine calls stay closer to the work and only exceptions move upward on purpose.</text>

      <rect class="panel panel-left" x="82" y="258" width="496" height="392" rx="28"/>
      <text class="panel-title" x="118" y="316">Without IVA</text>
      <text class="panel-copy" x="118" y="352">Routine work keeps leaving the room.</text>

      <rect class="node" x="154" y="540" width="210" height="88" rx="20"/>
      <text class="node-title" x="182" y="592">Work gets done</text>

      <rect class="node" x="220" y="426" width="220" height="86" rx="20"/>
      <text class="node-title" x="250" y="478">Manager review</text>

      <rect class="node" x="286" y="314" width="220" height="86" rx="20"/>
      <text class="node-title" x="322" y="366">Executive review</text>

      <path class="arrow-blue" d="M258 540 C258 520, 286 512, 320 512"/>
      <path class="arrow-blue" d="M372 426 C372 404, 394 398, 394 400"/>
      <path class="arrow-blue" d="M394 314 C394 286, 394 286, 394 286"/>
      <path class="arrow-soft" d="M506 358 C540 386, 548 438, 528 484 C508 530, 446 554, 366 566"/>
      <path class="arrow-blue" d="M528 484 C502 516, 464 540, 394 566"/>

      <rect class="node-accent" x="420" y="514" width="118" height="116" rx="20"/>
      <text class="node-title" x="448" y="560">Edits</text>
      <text class="node-copy" x="446" y="590">fall</text>
      <text class="node-copy" x="441" y="612">back down</text>

      <rect class="panel panel-right" x="622" y="258" width="496" height="392" rx="28"/>
      <text class="panel-title" x="658" y="316">With IVA</text>
      <text class="panel-copy" x="658" y="352">Routine authority stays close to the work.</text>

      <rect class="node-accent" x="692" y="540" width="228" height="88" rx="20"/>
      <text class="node-title" x="726" y="592">Work + routine authority</text>

      <rect class="node" x="960" y="428" width="114" height="84" rx="20"/>
      <text class="node-title" x="985" y="478">Exception</text>

      <rect class="node" x="886" y="314" width="188" height="86" rx="20"/>
      <text class="node-title" x="922" y="366">Escalates on purpose</text>

      <path class="arrow-amber" d="M920 576 C974 560, 1008 540, 1018 512"/>
      <path class="arrow-amber" d="M1018 428 C1012 392, 994 378, 968 400"/>
      <path class="arrow-blue" d="M968 400 C936 418, 900 452, 882 500"/>

      <rect class="node" x="660" y="428" width="218" height="86" rx="20"/>
      <text class="node-title" x="692" y="478">Decides where the work lives</text>

      <path class="arrow-amber" d="M806 540 C806 520, 796 510, 770 514"/>
      <path class="arrow-blue" d="M770 428 C770 400, 770 392, 770 392"/>

      <circle cx="96" cy="688" r="8" fill="#4a5673"/>
      <text class="legend-label" x="116" y="694">Default path</text>
      <text class="legend-copy" x="246" y="694">What work usually has to do.</text>

      <circle cx="478" cy="688" r="8" fill="#f2a900"/>
      <text class="legend-label" x="498" y="694">Intentional escalation</text>
      <text class="legend-copy" x="670" y="694">What actually needs to go up.</text>
    </svg>
  </figure>
</div>
