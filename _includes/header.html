<header class="iva-header" role="banner">
  <div class="iva-header-inner">

    <a class="iva-header-brand iva-header-brand-link" href="{{ site.baseurl }}/" aria-label="Integrated Value Architecture home">
      <img
        src="{{ site.baseurl }}/assets/images/tmlogo.png"
        alt="Integrated Value Architecture logo"
        class="iva-header-logo"
      >
      <div class="iva-header-brand-text">
        <div class="iva-header-title">Integrated Value Architecture</div>
      </div>
    </a>

    <button
      class="iva-header-toggle"
      id="iva-menu-toggle"
      type="button"
      aria-label="Open menu"
      aria-controls="iva-nav"
      aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="iva-header-nav" id="iva-nav" aria-label="Primary navigation">
      <a
        class="iva-header-link{% if page.url == '/services/' %} is-active{% endif %}"
        href="{{ site.baseurl }}/services/">
        Services
      </a>

      <a
        class="iva-header-link{% if page.url == '/common-problems-we-fix/' %} is-active{% endif %}"
        href="{{ site.baseurl }}/common-problems-we-fix/">
        Common Problems
      </a>

      <a
        class="iva-header-link{% if page.url == '/about/' %} is-active{% endif %}"
        href="{{ site.baseurl }}/about/">
        About
      </a>

      <a
        class="iva-header-link{% if page.url == '/contact/' %} is-active{% endif %}"
        href="{{ site.baseurl }}/contact/">
        Contact
      </a>

      <a
        class="iva-btn-primary iva-header-cta"
        href="https://book.ms/b/IntegratedValueArchitectureLLC@integratedvaluearchitecture.com"
        target="_blank"
        rel="noopener">
        Book a Call
      </a>
    </nav>

  </div>
</header>
