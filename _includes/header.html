{% assign current_url = page.url | replace:'index.html','' %}

<header class="iva-header">
  <div class="iva-header-inner">
    
    <div class="iva-header-brand">
      <a class="iva-header-brand-link" href="/">
        <img class="iva-header-logo" src="{{ site.baseurl }}/assets/images/tmlogo.png" alt="Integrated Value Architecture logo">
        <span class="iva-header-title">Integrated Value Architecture</span>
      </a>
    </div>

    <button
      class="iva-header-toggle"
      id="iva-menu-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="iva-nav"
      aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="iva-header-nav" id="iva-nav" aria-label="Primary">
      <a class="iva-header-link{% if current_url == '/' %} is-active{% endif %}" href="/">Home</a>

      <a class="iva-header-link{% if current_url == '/services/' %} is-active{% endif %}" href="/services/">Services</a>

      <a class="iva-header-link{% if current_url == '/what-clients-get/' %} is-active{% endif %}" href="/what-clients-get/">What Clients Get</a>

      <a class="iva-header-link{% if current_url == '/case-structural-overload-and-decision-bottleneck/' %} is-active{% endif %}" href="/case-structural-overload-and-decision-bottleneck/">
        Proof of Concept
      </a>

      <a class="iva-header-link{% if current_url == '/about/' %} is-active{% endif %}" href="/about/">About</a>

      <a class="iva-header-link{% if current_url == '/contact/' %} is-active{% endif %}" href="/contact/">Contact</a>

      <a class="iva-btn-primary iva-header-cta{% if current_url == '/fixed-fee-review/' %} is-active{% endif %}" href="/fixed-fee-review/">
        Fixed-Fee Review
      </a>
    </nav>

  </div>
</header>
