<div class="iva-visual-block" aria-labelledby="approvalLoopTitle approvalLoopDesc">
  <figure class="iva-visual-frame">
    <svg viewBox="0 0 920 290" role="img" aria-labelledby="approvalLoopTitle approvalLoopDesc" xmlns="http://www.w3.org/2000/svg">
      <title id="approvalLoopTitle">Approval bottleneck loop</title>
      <desc id="approvalLoopDesc">Finished work goes up for approval, sits in review, returns with edits, and the same person fixes it before it goes back up again.</desc>

      <defs>
        <marker id="ivaArrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0 0 L10 5 L0 10 Z" fill="#4A5673"></path>
        </marker>
        <style>
          .iva-step { fill: #ffffff; stroke: rgba(31,42,68,0.12); stroke-width: 2; }
          .iva-step-dark { fill: #1F2A44; stroke: #1F2A44; }
          .iva-step-accent { fill: #FFF4D6; stroke: rgba(242,169,0,0.45); stroke-width: 2; }
          .iva-label { font: 700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1F2A44; }
          .iva-label-dark { font: 700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; }
          .iva-line { fill: none; stroke: #4A5673; stroke-width: 3; marker-end: url(#ivaArrowHead); }
        </style>
      </defs>

      <rect x="48" y="96" width="156" height="72" rx="16" class="iva-step-dark"></rect>
      <text x="126" y="125" text-anchor="middle" class="iva-label-dark">
        <tspan x="126" dy="0">Work is</tspan>
        <tspan x="126" dy="22">finished</tspan>
      </text>

      <rect x="256" y="96" width="166" height="72" rx="16" class="iva-step"></rect>
      <text x="339" y="125" text-anchor="middle" class="iva-label">
        <tspan x="339" dy="0">Sent up for</tspan>
        <tspan x="339" dy="22">approval</tspan>
      </text>

      <rect x="474" y="96" width="156" height="72" rx="16" class="iva-step-accent"></rect>
      <text x="552" y="125" text-anchor="middle" class="iva-label">
        <tspan x="552" dy="0">Sits in</tspan>
        <tspan x="552" dy="22">review</tspan>
      </text>

      <rect x="682" y="96" width="166" height="72" rx="16" class="iva-step"></rect>
      <text x="765" y="125" text-anchor="middle" class="iva-label">
        <tspan x="765" dy="0">Returns</tspan>
        <tspan x="765" dy="22">with edits</tspan>
      </text>

      <rect x="362" y="214" width="204" height="58" rx="16" class="iva-step"></rect>
      <text x="464" y="248" text-anchor="middle" class="iva-label">Same person fixes it</text>

      <path d="M204 132 L256 132" class="iva-line"></path>
      <path d="M422 132 L474 132" class="iva-line"></path>
      <path d="M630 132 L682 132" class="iva-line"></path>

      <path d="M765 168 C765 205, 665 223, 566 233" class="iva-line"></path>
      <path d="M362 243 C274 234, 188 209, 142 172" class="iva-line"></path>
    </svg>
  </figure>

  <p class="iva-visual-note">
    Finished work goes up the chain for approval, sits in review, comes back with edits, and the same person still has to fix it before it goes back up again.
  </p>
</div>
