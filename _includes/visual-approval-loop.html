<div class="iva-visual-block" aria-labelledby="approvalLoopTitle approvalLoopDesc">
  <figure class="iva-visual-frame">
    <svg viewBox="0 0 920 250" role="img" aria-labelledby="approvalLoopTitle approvalLoopDesc" xmlns="http://www.w3.org/2000/svg">
      <title id="approvalLoopTitle">Approval bottleneck loop</title>
      <desc id="approvalLoopDesc">Finished work goes up for approval, sits in review, returns with edits, and the same person fixes it before it goes back up again.</desc>

      <defs>
        <marker id="ivaArrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0 0 L10 5 L0 10 Z" fill="#4A5673"></path>
        </marker>
        <style>
          .iva-step { fill: #ffffff; stroke: rgba(31,42,68,0.12); stroke-width: 2; }
          .iva-step-dark { fill: #1F2A44; stroke: #1F2A44; }
          .iva-step-accent { fill: #FFF4D6; stroke: rgba(242,169,0,0.45); stroke-width: 2; }
          .iva-label { font: 700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1F2A44; }
          .iva-label-dark { font: 700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; }
          .iva-line { fill: none; stroke: #4A5673; stroke-width: 3; marker-end: url(#ivaArrowHead); }
        </style>
      </defs>

      <rect x="28" y="52" width="186" height="68" rx="16" class="iva-step-dark"></rect>
      <text x="121" y="80" text-anchor="middle" class="iva-label-dark">
        <tspan x="121" dy="0">Work is</tspan>
        <tspan x="121" dy="22">finished</tspan>
      </text>

      <rect x="244" y="52" width="186" height="68" rx="16" class="iva-step"></rect>
      <text x="337" y="80" text-anchor="middle" class="iva-label">
        <tspan x="337" dy="0">Sent up for</tspan>
        <tspan x="337" dy="22">approval</tspan>
      </text>

      <rect x="460" y="52" width="186" height="68" rx="16" class="iva-step-accent"></rect>
      <text x="553" y="80" text-anchor="middle" class="iva-label">
        <tspan x="553" dy="0">Sits in</tspan>
        <tspan x="553" dy="22">review</tspan>
      </text>

      <rect x="676" y="52" width="186" height="68" rx="16" class="iva-step"></rect>
      <text x="769" y="80" text-anchor="middle" class="iva-label">
        <tspan x="769" dy="0">Returns</tspan>
        <tspan x="769" dy="22">with edits</tspan>
      </text>

      <rect x="348" y="160" width="224" height="56" rx="16" class="iva-step"></rect>
      <text x="460" y="194" text-anchor="middle" class="iva-label">Same person fixes it</text>

      <path d="M214 86 L244 86" class="iva-line"></path>
      <path d="M430 86 L460 86" class="iva-line"></path>
      <path d="M646 86 L676 86" class="iva-line"></path>

      <path d="M769 120 C769 150, 670 165, 572 178" class="iva-line"></path>
      <path d="M348 188 C258 179, 168 157, 118 121" class="iva-line"></path>
    </svg>
  </figure>

  <p class="iva-visual-note">
    Finished work goes up the chain for approval, sits in review, comes back with edits, and the same person still has to fix it before it goes back up again.
  </p>
</div>
