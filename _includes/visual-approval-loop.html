<div class="iva-visual-block" aria-labelledby="approvalLoopTitle approvalLoopDesc">
  <figure class="iva-visual-frame">
    <svg viewBox="0 0 900 300" role="img" aria-labelledby="approvalLoopTitle approvalLoopDesc" xmlns="http://www.w3.org/2000/svg">
      <title id="approvalLoopTitle">Approval bottleneck loop</title>
      <desc id="approvalLoopDesc">A simple loop showing finished work going up for approval, sitting in review, coming back with edits, and returning to the same person for correction.</desc>

      <defs>
        <marker id="ivaArrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M0 0 L10 5 L0 10 Z" fill="#4A5673"></path>
        </marker>
        <style>
          .iva-step { fill: #ffffff; stroke: rgba(31,42,68,0.12); stroke-width: 2; }
          .iva-step-dark { fill: #1F2A44; stroke: #1F2A44; }
          .iva-step-accent { fill: #FFF4D6; stroke: rgba(242,169,0,0.45); stroke-width: 2; }
          .iva-label { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1F2A44; }
          .iva-label-dark { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; }
          .iva-copy { font: 500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5A6278; }
          .iva-copy-dark { font: 500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: rgba(255,255,255,0.82); }
          .iva-line { fill: none; stroke: #4A5673; stroke-width: 3; marker-end: url(#ivaArrowHead); }
          .iva-chip { fill: rgba(31,42,68,0.05); stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .iva-chip-text { font: 600 12px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #4A5673; letter-spacing: 0.04em; text-transform: uppercase; }
        </style>
      </defs>

      <rect x="32" y="104" width="142" height="66" rx="16" class="iva-step-dark"></rect>
      <text x="103" y="132" text-anchor="middle" class="iva-label-dark">
        <tspan x="103" dy="0">Work</tspan>
        <tspan x="103" dy="20">finished</tspan>
      </text>
      <text x="103" y="160" text-anchor="middle" class="iva-copy-dark">Ready to move</text>

      <rect x="226" y="104" width="148" height="66" rx="16" class="iva-step"></rect>
      <text x="300" y="132" text-anchor="middle" class="iva-label">
        <tspan x="300" dy="0">Sent for</tspan>
        <tspan x="300" dy="20">approval</tspan>
      </text>
      <text x="300" y="160" text-anchor="middle" class="iva-copy">Routine work climbs</text>

      <rect x="428" y="104" width="142" height="66" rx="16" class="iva-step-accent"></rect>
      <text x="499" y="132" text-anchor="middle" class="iva-label">
        <tspan x="499" dy="0">Sits in</tspan>
        <tspan x="499" dy="20">review</tspan>
      </text>
      <text x="499" y="160" text-anchor="middle" class="iva-copy">Delay starts here</text>

      <rect x="620" y="104" width="148" height="66" rx="16" class="iva-step"></rect>
      <text x="694" y="132" text-anchor="middle" class="iva-label">
        <tspan x="694" dy="0">Returns</tspan>
        <tspan x="694" dy="20">with edits</tspan>
      </text>
      <text x="694" y="160" text-anchor="middle" class="iva-copy">Small changes come down</text>

      <rect x="404" y="218" width="190" height="56" rx="16" class="iva-step"></rect>
      <text x="499" y="243" text-anchor="middle" class="iva-label">Same person fixes it</text>
      <text x="499" y="263" text-anchor="middle" class="iva-copy">Ownership never left</text>

      <path d="M174 137 L226 137" class="iva-line"></path>
      <path d="M374 137 L428 137" class="iva-line"></path>
      <path d="M570 137 L620 137" class="iva-line"></path>
      <path d="M694 170 C694 205, 622 226, 594 234" class="iva-line"></path>
      <path d="M404 246 C308 240, 214 214, 166 170" class="iva-line"></path>

      <rect x="44" y="24" width="154" height="34" rx="17" class="iva-chip"></rect>
      <text x="121" y="46" text-anchor="middle" class="iva-chip-text">approval moves up</text>

      <rect x="224" y="24" width="184" height="34" rx="17" class="iva-chip"></rect>
      <text x="316" y="46" text-anchor="middle" class="iva-chip-text">correction work falls back</text>
    </svg>
  </figure>

  <p class="iva-visual-note">
    The queue is not the whole problem. The person closest to the work still owns the file while approval travels upward and correction work comes back down.
  </p>
</div>
