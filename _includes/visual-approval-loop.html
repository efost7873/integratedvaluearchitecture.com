<div class="iva-visual-block iva-visual-block--loop" aria-labelledby="approval-loop-title approval-loop-desc">
  <figure class="iva-visual-card">
    <svg viewBox="0 0 1200 760" role="img" aria-labelledby="approval-loop-title approval-loop-desc" xmlns="http://www.w3.org/2000/svg">
      <title id="approval-loop-title">Approval bottleneck loop</title>
      <desc id="approval-loop-desc">A diagram showing finished work going up for approval, sitting in review, coming back with edits, and falling back on the same person to fix before the file goes up again.</desc>
      <defs>
        <linearGradient id="approvalBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f7f8fc"/>
        </linearGradient>
        <filter id="approvalShadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14203a" flood-opacity="0.10"/>
        </filter>
        <marker id="approvalArrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
          <path d="M0,0 L18,9 L0,18 Z" fill="#4a5673"/>
        </marker>
        <style>
          .frame { fill: url(#approvalBg); stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .eyebrow { font: 700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #4a5673; }
          .headline { font: 700 44px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .subcopy { font: 500 23px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .node { fill: #ffffff; stroke: rgba(31,42,68,0.10); stroke-width: 2; }
          .node-dark { fill: #1f2a44; stroke: #1f2a44; stroke-width: 2; }
          .node-accent { fill: #fff4d6; stroke: rgba(242,169,0,0.42); stroke-width: 2; }
          .node-title { font: 700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .node-title-inverse { font: 700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; }
          .node-copy { font: 500 19px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
          .node-copy-inverse { font: 500 19px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: rgba(255,255,255,0.85); }
          .connector { stroke: #4a5673; stroke-width: 7; fill: none; marker-end: url(#approvalArrow); }
          .connector-soft { stroke: rgba(31,42,68,0.20); stroke-width: 4; stroke-dasharray: 10 12; fill: none; }
          .cost-card { fill: #ffffff; stroke: rgba(31,42,68,0.08); stroke-width: 1.5; }
          .cost-kicker { font: 700 15px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #4a5673; }
          .cost-title { font: 700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #1f2a44; }
          .cost-copy { font: 500 17px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; fill: #5a6278; }
        </style>
      </defs>

      <rect class="frame" x="18" y="18" width="1164" height="724" rx="34" filter="url(#approvalShadow)"/>

      <text class="eyebrow" x="82" y="94">Approval bottlenecks</text>
      <text class="headline" x="82" y="152">Finished work still takes the same slow lap.</text>
      <text class="subcopy" x="82" y="202">The file leaves the person who did the work, sits in review, comes back with small edits, and lands on the same person to fix before it goes up again.</text>

      <rect class="node-dark" x="82" y="268" width="250" height="144" rx="24"/>
      <text class="node-title-inverse" x="114" y="322">Work is finished</text>
      <text class="node-copy-inverse" x="114" y="360">The contract, budget,</text>
      <text class="node-copy-inverse" x="114" y="388">proposal, or report is ready.</text>

      <rect class="node" x="420" y="236" width="300" height="148" rx="24"/>
      <text class="node-title" x="454" y="292">Sent up for approval</text>
      <text class="node-copy" x="454" y="330">Routine work leaves the room</text>
      <text class="node-copy" x="454" y="358">instead of moving forward.</text>

      <rect class="node-accent" x="794" y="268" width="310" height="144" rx="24"/>
      <text class="node-title" x="828" y="324">Sits in review</text>
      <text class="node-copy" x="828" y="362">The file waits while one more</text>
      <text class="node-copy" x="828" y="390">person wants to look at it.</text>

      <rect class="node" x="760" y="482" width="344" height="144" rx="24"/>
      <text class="node-title" x="794" y="538">Comes back with edits</text>
      <text class="node-copy" x="794" y="576">Wording changes, small pricing</text>
      <text class="node-copy" x="794" y="604">changes, one more correction.</text>

      <rect class="node" x="340" y="514" width="330" height="148" rx="24"/>
      <text class="node-title" x="374" y="570">Same person fixes it</text>
      <text class="node-copy" x="374" y="608">Ownership never left the worker.</text>
      <text class="node-copy" x="374" y="636">Only the delay moved around.</text>

      <path class="connector" d="M332 340 C374 340, 384 310, 420 310"/>
      <path class="connector" d="M720 310 C756 310, 758 340, 794 340"/>
      <path class="connector" d="M948 412 C948 446, 948 454, 948 482"/>
      <path class="connector" d="M760 554 C724 554, 710 558, 670 570"/>
      <path class="connector" d="M390 514 C324 496, 256 454, 222 412"/>
      <path class="connector-soft" d="M232 412 C226 472, 274 560, 362 604"/>
      <path class="connector" d="M670 626 C750 650, 842 652, 920 622"/>

      <rect class="cost-card" x="82" y="456" width="208" height="176" rx="22"/>
      <text class="cost-kicker" x="112" y="496">What the loop creates</text>
      <text class="cost-title" x="112" y="536">Deadlines slip</text>
      <text class="cost-copy" x="112" y="570">Routine work waits on a path</text>
      <text class="cost-copy" x="112" y="596">that should have taken minutes.</text>

      <rect class="cost-card" x="82" y="640" width="312" height="74" rx="20" opacity="0"/>

      <rect class="cost-card" x="438" y="54" width="304" height="110" rx="22" opacity="0"/>

      <rect class="cost-card" x="466" y="54" width="300" height="112" rx="22"/>
      <text class="cost-kicker" x="498" y="94">What falls back down</text>
      <text class="cost-title" x="498" y="132">Correction work piles up</text>
      <text class="cost-copy" x="498" y="158">The person closest to the work still owns every rewrite.</text>

      <rect class="cost-card" x="810" y="54" width="292" height="112" rx="22"/>
      <text class="cost-kicker" x="842" y="94">What does not wait</text>
      <text class="cost-title" x="842" y="132">Revenue and decisions stall</text>
      <text class="cost-copy" x="842" y="158">Billing, sales, and next steps sit behind the same queue.</text>
    </svg>
  </figure>
</div>
